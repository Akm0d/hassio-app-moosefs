---
name: MooseFS
version: dev
slug: moosefs
description: Mount a MooseFS share on Home Assistant and expose the MooseFS GUI
url: https://github.com/Akm0d/hassio-app-moosefs
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_title: MooseFS
panel_icon: mdi:folder-network
apparmor: false
arch:
  - aarch64
  - amd64
devices:
  - /dev/fuse
privileged:
  - SYS_ADMIN
ports:
  8099/tcp: null
ports_description:
  8099/tcp: MooseFS Web UI
map:
  - type: share
    read_only: false
options:
  log_level: info
  master_host: mfsmaster
  master_port: 9421
  master_subfolder: /
  master_password: ""
  mount_point: /share/moosefs
  mount_enabled: true
  delayed_init: true
  allow_direct_webui: false
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  master_host: str
  master_port: int(1,65535)
  master_subfolder: match(^/.*$)
  master_password: str
  mount_point: match(^/.+$)
  mount_enabled: bool
  delayed_init: bool
  allow_direct_webui: bool
